# AmityVox Configuration
# Copy this to amityvox.toml and edit for your deployment.
# Environment variables override config values: AMITYVOX_DATABASE_URL, etc.

[instance]
domain = "localhost"
name = "AmityVox"
description = ""
federation_mode = "closed"  # "open", "allowlist", "closed"

[database]
url = "postgres://amityvox:amityvox@localhost:5432/amityvox?sslmode=disable"
max_connections = 25
# For Raspberry Pi / small deployments: max_connections = 10

[nats]
url = "nats://localhost:4222"

[cache]
url = "redis://localhost:6379"  # DragonflyDB is Redis-compatible

[storage]
type = "s3"
endpoint = "http://localhost:3900"   # Garage S3 API port
bucket = "amityvox"
access_key = ""                       # Set from: garage key info <key_name>
secret_key = ""                       # Set from: garage key info <key_name>
region = "garage"
use_ssl = false
# Compatible with any S3 backend: Garage (default), MinIO, AWS S3, Wasabi, Backblaze B2
# For MinIO: endpoint = "http://localhost:9000", region = "us-east-1"

[livekit]
url = "ws://localhost:7880"         # Internal URL for server-side SDK
public_url = "wss://localhost/rtc"  # Public WSS URL returned to browser clients
api_key = ""
api_secret = ""

[search]
enabled = true
url = "http://localhost:7700"
api_key = ""

[auth]
session_duration = "720h"  # 30 days
registration_enabled = true
invite_only = false
require_email = false

[auth.webauthn]
rp_display_name = "AmityVox"
rp_id = "localhost"                # Must match your domain
rp_origins = ["http://localhost"]  # Allowed origins for WebAuthn ceremonies

[push]
# WebPush VAPID keys. Generate with: npx web-push generate-vapid-keys
# Leave empty to disable push notifications.
vapid_public_key = ""
vapid_private_key = ""
vapid_contact_email = ""

[giphy]
# Giphy GIF integration. Set enabled = true and provide an API key to enable GIF search.
# Get a free API key at https://developers.giphy.com/dashboard/
# See docs/giphy-setup.md for detailed instructions.
enabled = false
api_key = ""

[media]
max_upload_size = "500MB"
image_thumbnail_sizes = [128, 256, 512]
transcode_video = true
strip_exif = true

[http]
listen = "0.0.0.0:8080"
cors_origins = ["*"]

[websocket]
listen = "0.0.0.0:8081"
heartbeat_interval = "30s"
heartbeat_timeout = "90s"

[logging]
level = "info"  # debug, info, warn, error
format = "json"  # json, text

[metrics]
enabled = true
listen = "0.0.0.0:9090"  # Prometheus endpoint

[federation]
# enforce_ip_check validates that federation requests come from IPs matching the sender domain.
enforce_ip_check = false
# shorthand is a short label (max 5 chars) displayed as a badge on federated guilds/users.
# Leave empty to auto-derive from the domain name. Example: "AV", "HOME"
shorthand = ""
# voice_mode controls how voice traffic is routed for federated calls.
# "direct" = clients connect directly to the remote instance's LiveKit server.
# "relay"  = voice traffic is proxied through the local instance (adds latency, preserves privacy).
voice_mode = "direct"
# peer_inbox_limit is the maximum number of queued inbound federation messages processed per peer
# before yielding. Lower values reduce memory pressure on small instances.
peer_inbox_limit = 20
# delivery_concurrency is the number of parallel goroutines used for outbound event delivery.
delivery_concurrency = 50
# media_cache_dir is the directory used to cache federated media files larger than 1 MB.
# The directory is created automatically if it does not exist.
media_cache_dir = "/tmp/amityvox-media-cache"
# media_cache_max_size_mb is the maximum total disk usage (in MB) for the on-disk media cache.
# When the limit is reached, the least-recently-used files are evicted.
media_cache_max_size_mb = 1024
# backfill_window_days is the maximum number of days of federation events replayed during a
# backfill sync. Events older than this window require a full re-sync (leave + rejoin).
backfill_window_days = 7
